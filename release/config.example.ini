[app]
name=content-bot-go
env=production
log_level=info
log_max_size_mb=10
auto_migrate=false
run_api=true
run_worker=true

[http]
host=0.0.0.0
# Set port to a number for a fixed API port, or use auto / 0 for a free port.
port=8080
read_timeout=15s
write_timeout=15s

[database]
# Use the connection string from the Supabase Connect panel.
# Prefer the Session pooler URL on IPv4-only networks.
url=postgresql://postgres:password@db.example.supabase.co:5432/postgres?sslmode=require
max_open_conns=10
max_idle_conns=5
conn_max_lifetime=30m

[deepseek]
api_key=
model=deepseek-chat

[gemini]
api_key=
model=gemini-2.5-flash

[twitter]
bearer_token=
vi_api_key=
vi_api_secret=
vi_access_token=
vi_access_secret=
en_api_key=
en_api_secret=
en_access_token=
en_access_secret=
