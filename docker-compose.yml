services:
  api:
    image: ${DOCKER_IMAGE_NAME:-content-bot-go}:${DOCKER_IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - config/.env
    command: ["/app/api"]
    ports:
      - "8080:8080"
    restart: unless-stopped

  worker:
    image: ${DOCKER_IMAGE_NAME:-content-bot-go}:${DOCKER_IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - config/.env
    command: ["/app/worker"]
    restart: unless-stopped

  migrate:
    image: ${DOCKER_IMAGE_NAME:-content-bot-go}:${DOCKER_IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - config/.env
    command: ["/app/migrate"]
    restart: "no"
    profiles:
      - tools

networks:
  default:
    name: content-bot-go_default
