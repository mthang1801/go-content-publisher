services:
  api:
    image: ${DOCKER_IMAGE_NAME:-content-bot-go}:${DOCKER_IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - config/.env
    network_mode: host
    command: ["/app/api"]
    restart: unless-stopped

  worker:
    image: ${DOCKER_IMAGE_NAME:-content-bot-go}:${DOCKER_IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - config/.env
    network_mode: host
    command: ["/app/worker"]
    restart: unless-stopped

  migrate:
    image: ${DOCKER_IMAGE_NAME:-content-bot-go}:${DOCKER_IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - config/.env
    network_mode: host
    command: ["/app/migrate"]
    restart: "no"
    profiles:
      - tools

  cli:
    image: ${DOCKER_IMAGE_NAME:-content-bot-go}:${DOCKER_IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - config/.env
    network_mode: host
    command: ["/app/cli"]
    profiles:
      - tools
